version: '3.8'

services:
  gowa:
    # Ansible akan me-replace ini saat deploy, tapi default-nya latest
    image: ${TARGET_IMAGE:-ghcr.io/khensin166/kainest-gowa:latest}
    container_name: kainest-gowa
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - gowa_storages:/app/storages
      - gowa_statics:/app/statics
    environment:
      # Credential masuk ke Web UI GOWA
      - APP_BASIC_AUTH=${GOWA_BASIC_AUTH_USER:-admin}:${GOWA_BASIC_AUTH_PASS:-admin}
      
      # Webhook URL (Ke Hono)
      - WHATSAPP_WEBHOOK=${WEBHOOK_URL}
      - WHATSAPP_WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      
      # Konfigurasi GOWA lainnya
      - APP_PORT=3000
      - APP_DEBUG=false
      - APP_OS=KainestOS
      - DB_URI=file:storages/whatsapp.db?_foreign_keys=on
    networks:
      - kainest_net

networks:
  kainest_net:
    external: true

volumes:
  gowa_storages:
  gowa_statics:
