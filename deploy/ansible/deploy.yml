---
- name: Kainest GOWA - Deploy & Force Update
  hosts: webservers
  become: yes
  vars:
    project_dir: /opt/kainest-gowa
    # Variabel target_image dan webhook_url diinjeksi dari GitHub Actions saat runtime
  tasks:
    - name: Membuat folder proyek di server target
      file:
        path: "{{ project_dir }}"
        state: directory
        mode: "0755"

    - name: Menyalin file docker-compose.deploy.yml ke server target
      copy:
        src: ../../docker-compose.deploy.yml
        dest: "{{ project_dir }}/docker-compose.yml"

    - name: Generate file .env di server target
      copy:
        content: |
          TARGET_IMAGE={{ target_image }}
          WEBHOOK_URL={{ webhook_url }}
          GOWA_BASIC_AUTH_USER={{ gowa_user | default('admin') }}
          GOWA_BASIC_AUTH_PASS={{ gowa_pass | default('rahasia') }}
        dest: "{{ project_dir }}/.env"
        mode: '0600'
      no_log: true
    
    - name: Memastikan jaringan global 'kainest_net' tersedia
      command: docker network create kainest_net
      register: network_result
      failed_when: 
        - network_result.rc != 0
        - "'already exists' not in network_result.stderr"
      changed_when: network_result.rc == 0

    - name: Memaksa pembaruan (Pull & Up) Docker Compose
      command: docker compose up -d --pull always --force-recreate --remove-orphans
      args:
        chdir: "{{ project_dir }}"
      register: compose_result
      failed_when: compose_result.rc != 0
      ignore_errors: yes

    - name: Debug Docker Compose Output (Jika Gagal)
      debug:
        msg: |
          STDOUT: {{ compose_result.stdout }}
          STDERR: {{ compose_result.stderr }}
      when: compose_result.rc != 0

    - name: Fail jika Docker Compose Gagal
      fail:
        msg: "Deployment gagal pada tahapan Docker Compose."
      when: compose_result.rc != 0

    - name: Hapus image lama yang tidak terpakai (Prune)
      command: docker image prune -f

    - name: Verifikasi Container Berjalan
      shell: docker inspect kainest-gowa --format='{{ '{{' }}.State.Status{{ '}}' }}'
      register: container_status
      until: container_status.stdout | replace('"', '') == "running"
      retries: 5
      delay: 3
